# Weekly refresh of per-country traffic curves from the Cloudflare Radar API.
# Free: runs ~2 min/week, far inside GitHub Actions' free tier.
# Requires one repo secret: CLOUDFLARE_API_TOKEN (Settings → Secrets → Actions).
# The commit it pushes triggers an automatic Vercel redeploy.
name: Refresh traffic data

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Fetch Cloudflare Radar data
        run: node scripts/fetch-radar.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/traffic.json
          git diff --cached --quiet || git commit -m "chore: weekly Cloudflare Radar traffic refresh"
          git push
